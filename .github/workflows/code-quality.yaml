name: Code Quality

on:
  push:
    branches: [main]

  pull_request:
    branches:
      - "*"

jobs:
  check_lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv lock --locked

  lint_and_format:
    runs-on: ubuntu-latest
    needs: [check_lockfile]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type_check:
    runs-on: ubuntu-latest
    needs: [check_lockfile]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv run pyrefly check
